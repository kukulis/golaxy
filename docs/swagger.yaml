basePath: /api
definitions:
  galaxy.Battle:
    properties:
      id:
        type: string
      post_side_a:
        $ref: '#/definitions/galaxy.Fleet'
      post_side_b:
        $ref: '#/definitions/galaxy.Fleet'
      shots:
        items:
          $ref: '#/definitions/galaxy.Shot'
        type: array
      side_a:
        $ref: '#/definitions/galaxy.Fleet'
      side_b:
        $ref: '#/definitions/galaxy.Fleet'
    type: object
  galaxy.Division:
    properties:
      id:
        type: string
      resources_amount:
        type: integer
      tech_attack:
        type: integer
      tech_cargo:
        type: integer
      tech_defense:
        type: integer
      tech_engines:
        type: integer
    type: object
  galaxy.Fleet:
    properties:
      id:
        type: string
      owner:
        description: owner race id
        type: string
      ships:
        items:
          $ref: '#/definitions/galaxy.Ship'
        type: array
    type: object
  galaxy.FleetBuild:
    properties:
      assignedShipModels:
        items:
          $ref: '#/definitions/galaxy.ShipModelAssignment'
        type: array
      attack_resources:
        type: number
      cargo_resources:
        type: number
      defense_resources:
        type: number
      division_id:
        type: string
      engine_resources:
        type: number
      id:
        description: stored to DB
        type: string
      race_id:
        type: string
      usedResources:
        format: float64
        type: number
    type: object
  galaxy.FleetBuildToShipModel:
    properties:
      amount:
        type: integer
      fleet_build_id:
        type: string
      result_mass:
        type: number
      ship_model_id:
        type: string
      shipModel:
        allOf:
        - $ref: '#/definitions/galaxy.ShipModel'
        description: not stored to DB directly
    type: object
  galaxy.Ship:
    properties:
      destroyed:
        type: boolean
      id:
        type: string
      name:
        type: string
      owner:
        description: race owner id
        type: string
      tech:
        $ref: '#/definitions/galaxy.ShipTech'
      version_id:
        type: string
    type: object
  galaxy.ShipModel:
    properties:
      cargo_mass:
        type: number
      defense_mass:
        type: number
      engine_mass:
        type: number
      guns:
        type: integer
      id:
        type: string
      name:
        type: string
      one_gun_mass:
        type: number
      owner_id:
        type: string
    type: object
  galaxy.ShipModelAssignment:
    properties:
      amount:
        type: integer
      shipModel:
        $ref: '#/definitions/galaxy.ShipModel'
    type: object
  galaxy.ShipTech:
    properties:
      attack:
        type: number
      cargo_capacity:
        type: number
      defense:
        type: number
      guns:
        type: integer
      mass:
        type: number
      speed:
        type: number
    type: object
  galaxy.Shot:
    properties:
      destination:
        type: string
      result:
        type: boolean
      source:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for Galaktika galaxy game
  title: Galaktika API
  version: "1.0"
paths:
  /battle:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/galaxy.Battle'
      summary: Get battle
      tags:
      - battles
  /divisions:
    get:
      produces:
      - application/json
      responses:
        "200":
