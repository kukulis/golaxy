<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaktika - Fleet Game</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/Goodstuff-No-Nonsense-Free-Space-Galaxy.ico">
</head>
<body>
    <div id="game-container">
        <h1>Galaktika</h1>

        <!-- Main Menu -->
        <div id="main-menu">
            <button id="open-battle">Open Battle</button>
            <a href="divisions.html">Divisions</a>
            <a href="dummy_login.html">Login</a>
        </div>

        <!-- Battle View (hidden by default) -->
        <div id="battle-view" style="display: none;">
            <div id="game-board">
                <svg id="galaxy" width="800" height="600"></svg>
            </div>
            <div id="controls">
                <button id="new-game">New Game</button>
                <button id="shot-button">Shot</button>
                <button id="auto-button">Auto</button>
                <button id="close-battle">Close Battle</button>
            </div>
        </div>
    </div>
<script type="module">
    import '/assets/js/user-bar.js';
    import { BattleProcessor } from '/assets/js/battle_processor.js';
    import { ApiClient } from '/assets/js/api.js';

    document.addEventListener('DOMContentLoaded', () => {
        const mainMenu = document.getElementById('main-menu');
        const battleView = document.getElementById('battle-view');
        const svg = document.getElementById('galaxy');
        const apiClient = new ApiClient();

        let battleProcessor = null;

        document.getElementById('open-battle').addEventListener('click', () => {
            mainMenu.style.display = 'none';
            battleView.style.display = 'block';

            if (!battleProcessor) {
                battleProcessor = new BattleProcessor(apiClient, svg);
                battleProcessor.init();
            } else {
                battleProcessor.newGame();
            }
        });

        document.getElementById('close-battle').addEventListener('click', () => {
            battleView.style.display = 'none';
            mainMenu.style.display = 'block';
        });
    });
</script>

</body>
</html>
