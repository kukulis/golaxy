<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaktika - Ship Models</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/Goodstuff-No-Nonsense-Free-Space-Galaxy.ico">
    <style>
        #container { width: 100%; max-width: 800px; }
        table { width: 100%; border-collapse: collapse; background-color: #1a1a1a; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #222; color: #4a9eff; font-weight: bold; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #222; }
        #error-msg { color: #ff4a4a; }
        a { color: #4a9eff; }
    </style>
</head>
<body>
<div id="game-container">
    <h1>Ship Models</h1>
    <div id="container"></div>
    <p><a href="/">Back</a></p>
</div>
<script type="module">
    import '/assets/js/user-bar.js';
    import {ApiClient} from '/assets/js/api.js';
    import {createShipModelTable} from '/assets/js/ship_model_table.js';

    const api = new ApiClient();
    try {
        const models = await api.getShipModels();
        document.getElementById('container').appendChild(createShipModelTable(models));
    } catch (e) {
        const err = document.createElement('p');
        err.id = 'error-msg';
        err.appendChild(document.createTextNode(e.message));
        document.getElementById('container').appendChild(err);
    }
</script>
</body>
</html>
