<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaktika - Fleet Build</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/Goodstuff-No-Nonsense-Free-Space-Galaxy.ico">
    <style>
        #fleet-build-container { width: 100%; max-width: 500px; }
        table { width: 100%; border-collapse: collapse; background-color: #1a1a1a; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #222; color: #4a9eff; font-weight: bold; width: 40%; }
        tr:last-child td { border-bottom: none; }
        #error-msg { color: #ff4a4a; }
        a { color: #4a9eff; }
    </style>
</head>
<body>
<div id="game-container">
    <h1 id="page-title"></h1>
    <div id="fleet-build-container">
        <p id="error-msg" style="display:none"></p>
        <table id="fleet-build-table" style="display:none">
            <tbody>
                <tr><th>ID</th><td id="fb-id"></td></tr>
                <tr><th>Division</th><td id="fb-division"></td></tr>
                <tr><th>Race</th><td id="fb-race"></td></tr>
                <tr><th>Attack Resources</th><td id="fb-attack"></td></tr>
                <tr><th>Defense Resources</th><td id="fb-defense"></td></tr>
                <tr><th>Engine Resources</th><td id="fb-engine"></td></tr>
                <tr><th>Cargo Resources</th><td id="fb-cargo"></td></tr>
            </tbody>
        </table>
    </div>
    <p><a id="back-link" href="#">Back</a></p>
</div>
<script type="module">
    import '/assets/js/user-bar.js';
    import {ApiClient} from '/assets/js/api.js';

    const buildId = location.pathname.split('/')[2];
    document.getElementById('page-title').textContent = `Fleet Build: ${buildId}`;

    const api = new ApiClient();
    try {
        const b = await api.getFleetBuild(buildId);
        document.getElementById('fb-id').textContent = b.id;
        document.getElementById('fb-division').textContent = b.division_id;
        document.getElementById('fb-race').textContent = b.race_id ?? '';
        document.getElementById('fb-attack').textContent = b.attack_resources ?? 0;
        document.getElementById('fb-defense').textContent = b.defense_resources ?? 0;
        document.getElementById('fb-engine').textContent = b.engine_resources ?? 0;
        document.getElementById('fb-cargo').textContent = b.cargo_resources ?? 0;
        document.getElementById('back-link').href = `/divisions/${b.division_id}/fleet-builds`;
        document.getElementById('fleet-build-table').style.display = '';
    } catch (e) {
        const err = document.getElementById('error-msg');
        err.textContent = e.message;
        err.style.display = '';
    }
</script>
</body>
</html>
